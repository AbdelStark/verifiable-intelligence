name: Nightly

on:
  schedule:
    - cron: "17 3 * * *"
    - cron: "43 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  browser-verifier-bench:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '17 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Browser verifier benchmark
        run: |
          mkdir -p reports/perf
          set -o pipefail
          npm run bench:browser 2>&1 | tee reports/perf/browser-verifier.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-browser-verifier-${{ github.run_id }}
          path: reports/perf/

  provider-image-no-cache:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '43 3 * * 0'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: verifiable-intelligence-provider:nightly-no-cache
      IMAGE_SIZE_LIMIT_BYTES: "8589934592"
    steps:
      - uses: actions/checkout@v4
      - name: Build provider image without cache
        run: |
          mkdir -p reports/perf
          set -o pipefail
          docker build \
            --no-cache \
            --iidfile reports/perf/provider-image.iid \
            -f provider/Dockerfile \
            -t "$IMAGE_TAG" \
            . 2>&1 | tee reports/perf/provider-image-no-cache-build.log
      - name: Run CPU stub smoke
        run: |
          set -o pipefail
          docker run --rm \
            -e VI_PROVIDER_STUB=1 \
            -e VI_PROVIDER_STUB_EXIT_AFTER_READY=1 \
            "$IMAGE_TAG" 2>&1 | tee reports/perf/provider-image-no-cache-smoke.log
      - name: Record provider image evidence
        run: |
          set -euo pipefail
          size_bytes="$(docker image inspect "$IMAGE_TAG" --format '{{.Size}}')"
          image_id="$(docker image inspect "$IMAGE_TAG" --format '{{.Id}}')"
          if [ -s reports/perf/provider-image.iid ]; then
            image_id="$(cat reports/perf/provider-image.iid)"
          fi
          {
            echo "## Provider Image No-Cache Build"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image size | ${size_bytes} bytes |"
            echo "| Image limit | ${IMAGE_SIZE_LIMIT_BYTES} bytes |"
            echo "| Image ID | ${image_id} |"
          } | tee reports/perf/provider-image-no-cache-summary.md | tee -a "$GITHUB_STEP_SUMMARY"
          if [ "$size_bytes" -gt "$IMAGE_SIZE_LIMIT_BYTES" ]; then
            echo "provider image exceeds size budget" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-provider-image-${{ github.run_id }}
          path: reports/perf/

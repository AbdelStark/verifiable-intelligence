name: Proof Bundle

on:
  pull_request:
    paths:
      - "fixtures/viex/**"
      - "broker/**"
      - "schemas/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/proof-bundle.yml"
  push:
    branches: ["main"]
    paths:
      - "fixtures/viex/**"
      - "broker/**"
      - "schemas/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/proof-bundle.yml"

jobs:
  proof-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run test:bundle

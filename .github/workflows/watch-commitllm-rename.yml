name: Watch CommitLLM Rename

on:
  schedule:
    - cron: "37 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Check watcher logic
        run: npm run test:commitllm-rename-watch
      - name: Poll upstream CommitLLM rename
        run: node scripts/ci/watch-commitllm-rename.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}


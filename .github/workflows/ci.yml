name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Rust fmt and clippy
        run: |
          mkdir -p reports/ci
          set -o pipefail
          scripts/ci/lints.sh 2>&1 | tee reports/ci/lint.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-lint-${{ github.run_id }}
          path: reports/ci/

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Actionlint workflows
        run: |
          mkdir -p reports/ci
          set -o pipefail
          npm run test:workflows 2>&1 | tee reports/ci/actionlint.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-actionlint-${{ github.run_id }}
          path: reports/ci/

  stable-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Cargo test
        run: |
          mkdir -p reports/ci
          set -o pipefail
          cargo test --workspace --all-features --locked 2>&1 | tee reports/ci/cargo-test.log
      - name: CLI-only no-default build
        run: |
          set -o pipefail
          cargo build -p verifiable-intelligence --no-default-features --locked 2>&1 | tee reports/ci/cli-only-build.log
      - name: Error envelope schema
        run: |
          set -o pipefail
          npm run test:error-envelopes 2>&1 | tee reports/ci/error-envelope-schema.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-stable-test-${{ github.run_id }}
          path: reports/ci/

  msrv-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.82.0
      - name: Install MSRV
        run: rustup toolchain install 1.82.0 --profile minimal
      - name: Cargo build on MSRV
        run: |
          mkdir -p reports/ci
          set -o pipefail
          cargo +1.82.0 build --workspace --all-targets --locked 2>&1 | tee reports/ci/msrv-build.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-msrv-build-${{ github.run_id }}
          path: reports/ci/

  proof-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Proof bundle contracts
        run: |
          mkdir -p reports/ci
          set -o pipefail
          npm run test:bundle 2>&1 | tee reports/ci/proof-bundle.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-proof-bundle-${{ github.run_id }}
          path: reports/ci/

  browser-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Browser demo tests
        run: |
          mkdir -p reports/ci
          set -o pipefail
          npm run test:demo 2>&1 | tee reports/ci/browser-demo.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-browser-demo-${{ github.run_id }}
          path: |
            reports/ci/
            test-results/
            playwright-report/

  size-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Size budget report
        run: |
          mkdir -p reports/perf
          set -o pipefail
          npm run test:size-budget 2>&1 | tee reports/perf/size-budget.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-size-budget-${{ github.run_id }}
          path: reports/perf/

  provider-image:
    runs-on: ubuntu-latest
    env:
      EVENT_BEFORE: ${{ github.event.before }}
      IMAGE_TAG: verifiable-intelligence-provider:ci
      IMAGE_SIZE_LIMIT_BYTES: "8589934592"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        name: Detect provider changes
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
            changed="$(git diff --name-only "origin/${GITHUB_BASE_REF}"...HEAD -- provider/ .github/workflows/ci.yml)"
          elif [ -n "${EVENT_BEFORE:-}" ] && [ "${EVENT_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            changed="$(git diff --name-only "${EVENT_BEFORE}" HEAD -- provider/ .github/workflows/ci.yml)"
          else
            changed="$(git diff --name-only HEAD^ HEAD -- provider/ .github/workflows/ci.yml 2>/dev/null || true)"
          fi

          if [ -n "$changed" ]; then
            printf 'Provider image-relevant changes detected:\n%s\n' "$changed" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No provider image-relevant changes detected; provider image smoke skipped." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build provider image
        if: steps.changes.outputs.should_run == 'true'
        run: |
          mkdir -p reports/ci
          set -o pipefail
          docker build \
            --iidfile reports/ci/provider-image.iid \
            -f provider/Dockerfile \
            -t "$IMAGE_TAG" \
            . 2>&1 | tee reports/ci/provider-image-build.log
      - name: Run CPU stub smoke
        if: steps.changes.outputs.should_run == 'true'
        run: |
          set -o pipefail
          docker run --rm \
            -e VI_PROVIDER_STUB=1 \
            -e VI_PROVIDER_STUB_EXIT_AFTER_READY=1 \
            "$IMAGE_TAG" 2>&1 | tee reports/ci/provider-image-smoke.log
      - name: Enforce image size budget
        if: steps.changes.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          size_bytes="$(docker image inspect "$IMAGE_TAG" --format '{{.Size}}')"
          image_id="$(docker image inspect "$IMAGE_TAG" --format '{{.Id}}')"
          if [ -s reports/ci/provider-image.iid ]; then
            image_id="$(cat reports/ci/provider-image.iid)"
          fi
          repo_digests="$(docker image inspect "$IMAGE_TAG" --format '{{range .RepoDigests}}{{println .}}{{end}}' | sed '/^$/d')"
          {
            echo "Provider image size: ${size_bytes} bytes"
            echo "Provider image limit: ${IMAGE_SIZE_LIMIT_BYTES} bytes"
            echo "Provider image ID: ${image_id}"
            if [ -n "$repo_digests" ]; then
              printf 'Provider repo digests:\n%s\n' "$repo_digests"
            else
              echo "Provider repo digests: unavailable for local-only image"
            fi
          } | tee reports/ci/provider-image-size.log | tee -a "$GITHUB_STEP_SUMMARY"
          if [ "$size_bytes" -gt "$IMAGE_SIZE_LIMIT_BYTES" ]; then
            echo "provider image exceeds size budget" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-provider-image-${{ github.run_id }}
          path: reports/ci/

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Cargo deny and forbidden edges
        run: |
          mkdir -p reports/ci
          set -o pipefail
          scripts/ci/deny.sh 2>&1 | tee reports/ci/supply-chain.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-supply-chain-${{ github.run_id }}
          path: reports/ci/

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Secret scan
        run: |
          mkdir -p reports/ci
          set -o pipefail
          npm run test:secret-scan 2>&1 | tee reports/ci/secret-scan.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-secret-scan-${{ github.run_id }}
          path: reports/ci/
